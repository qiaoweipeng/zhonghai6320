<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>众海6320-消防报警控制器仿真</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        /* 禁止文本选中和双击选中 */
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        /* 禁止双击选中（移动端） */
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      body { overflow: auto; min-height: 100vh; background: #fff; }
      #app { min-height: 100vh; display: flex; align-items: center; }
      #app > div { margin: 0 auto; padding: 16px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!-- 组件按依赖顺序加载：基础组件在前，复合组件在后 -->
    <script src="js/audio.js"></script>
    <script src="js/components/LightItem.js"></script>
    <script src="js/components/SmallBtn.js"></script>
    <script src="js/components/ScreenBtn.js"></script>
    <script src="js/pages/AlarmPage.js"></script>
    <script src="js/pages/MenuPage.js"></script>
    <script src="js/pages/SearchPage.js"></script>
    <script src="js/pages/DevicePage.js"></script>
    <script src="js/components/Screen.js"></script>
    <script src="js/components/ExamComponent.js"></script>
    <script src="js/pages/HomePage.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
